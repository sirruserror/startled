name: hmmmm hmmmm eh
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt install -y clang make
      - name: Build
        run: make
      - name: Strip binary
        run: strip out/startled
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          tar -czf startled-${VERSION}-linux-x86_64.tar.gz -C out startled
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: startled-binary
          path: startled-${{ github.ref_name }}-linux-x86_64.tar.gz
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: startled-${{ github.ref_name }}-linux-x86_64.tar.gz